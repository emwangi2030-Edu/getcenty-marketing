# Deployed live: centyhq.com + www → 301 to https://www.getcenty.com (path preserved)
# ACME: RewriteCond skips /.well-known/acme-challenge/

docRoot                   $VH_ROOT/public_html
vhDomain                  centyhq.com
vhAliases                 www.centyhq.com
adminEmails               admin@centycapital.com
enableGzip                1

index  {
  useServer               0
  indexFiles              index.html
}

errorlog $VH_ROOT/logs/error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b"
  rollingSize             10M
  keepDays                10
}

rewrite  {
  enable                  1
  autoLoadHtaccess        0
  rules                   <<<END_rules
RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
RewriteRule ^(.*)$ https://www.getcenty.com%{REQUEST_URI} [R=301,L]
END_rules
}

context /.well-known/acme-challenge {
  location                /usr/local/lsws/Example/html/.well-known/acme-challenge
  allowBrowse             1
  rewrite  { enable 0 }
  addDefaultCharset       off
}

vhssl  {
  keyFile                 /etc/letsencrypt/live/centyhq.com/privkey.pem
  certFile                /etc/letsencrypt/live/centyhq.com/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling          1
}
