# Sync SEO CSVs to Google Sheets + append GSC metrics.
# Secrets: GOOGLE_APPLICATION_CREDENTIALS_JSON, SEO_SHEET_ID
# Optional: GSC_SITES (comma-separated Search Console property URLs)
#
# Node: checkout@v6 + setup-python@v6 run on Node 24; FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opts in early.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: SEO — Sheets push & GSC report

on:
  schedule:
    - cron: "0 7 * * 1" # Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      command:
        description: "Job to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - push
          - gsc

jobs:
  automate:
    runs-on: ubuntu-latest
    # Use Node 24 for JS-based actions (see GitHub deprecation of Node 20 on runners).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: tools/seo-automation
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/seo-automation/requirements.txt

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account JSON (validate + avoid shell mangling)
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          python ci_write_credentials.py

      - name: Sync CSVs → Google Sheet
        id: push
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.command == 'push' || github.event.inputs.command == 'all')) }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          SEO_SHEET_ID: ${{ secrets.SEO_SHEET_ID }}
        run: |
          set -euo pipefail
          if [ -z "${SEO_SHEET_ID:-}" ]; then
            echo "::error::Missing secret SEO_SHEET_ID"
            exit 1
          fi
          python sync_push.py

      - name: GSC report → Sheet
        id: gsc
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.command == 'gsc' || github.event.inputs.command == 'all')) }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          SEO_SHEET_ID: ${{ secrets.SEO_SHEET_ID }}
          GSC_SITES: ${{ secrets.GSC_SITES }}
        run: |
          set -euo pipefail
          if [ -z "${SEO_SHEET_ID:-}" ]; then
            echo "::error::Missing secret SEO_SHEET_ID"
            exit 1
          fi
          python gsc_report.py
