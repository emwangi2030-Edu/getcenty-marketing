# OpenLiteSpeed vhost: marketing site (www.getcenty.com + getcenty.com)
# 1) mkdir -p /home/getcenty.com/public_html/logs
# 2) Place index.html + styles.css in public_html
# 3) Issue cert: certbot certonly --webroot -w /usr/local/lsws/Example/html -d getcenty.com -d www.getcenty.com
# 4) Add virtualHost getcenty.com { ... } + map in httpd_config.conf, then restart lsws

docRoot                   $VH_ROOT/public_html
vhDomain                  getcenty.com
vhAliases                 www.getcenty.com
adminEmails               admin@centycapital.com
enableGzip                1

index  {
  useServer               0
  indexFiles              index.html
}

# Custom 404 (upload 404.html to public_html): WebAdmin → VHosts → getcenty.com → General
# → Customized Error Pages → 404 → /404.html  (path may vary by OLS version).
# Keeps branded page + noindex meta for SEO.

errorlog $VH_ROOT/logs/error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b"
  rollingSize             10M
  keepDays                10
}

context /.well-known/acme-challenge {
  location                /usr/local/lsws/Example/html/.well-known/acme-challenge
  allowBrowse             1
  rewrite  { enable 0 }
  addDefaultCharset       off
}

vhssl  {
  keyFile                 /etc/letsencrypt/live/getcenty.com/privkey.pem
  certFile                /etc/letsencrypt/live/getcenty.com/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling          1
}
