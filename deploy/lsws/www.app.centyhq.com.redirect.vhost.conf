# Optional: www.app.centyhq.com → https://app.centyhq.com/ (canonical app host)
# Create /home/www.app.centyhq.com/public_html (can be empty)

docRoot                   $VH_ROOT/public_html
vhDomain                  www.app.centyhq.com
adminEmails               admin@centycapital.com

errorlog $VH_ROOT/logs/error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

rewrite  {
  enable                  1
  autoLoadHtaccess        0
  rules                   <<<END_rules
RewriteRule ^ https://app.centyhq.com%{REQUEST_URI} [R=301,L]
END_rules
}

context /.well-known/acme-challenge {
  location                /usr/local/lsws/Example/html/.well-known/acme-challenge
  allowBrowse             1
  rewrite  { enable 0 }
  addDefaultCharset       off
}

vhssl  {
  keyFile                 /etc/letsencrypt/live/www.app.centyhq.com/privkey.pem
  certFile                /etc/letsencrypt/live/www.app.centyhq.com/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling          1
}
